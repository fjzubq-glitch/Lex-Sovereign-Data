<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LexSearch Gold — Audio & Academia</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=Lora:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════
   GOLD & ABYSS DESIGN SYSTEM (Bajo Consumo)
═══════════════════════════════════════════════════ */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --abyss:    #0a0a0a;
  --gold:     #d4af37;
  --gold-dim: rgba(212, 175, 55, 0.2);
  --card:     #111111;
  --rim:      rgba(212, 175, 55, 0.1);
  --white:    #e5e5e5;
  --muted:    #888888;
  --mono:     'Courier New', Courier, monospace;
}

body { 
  font-family: 'DM Sans', sans-serif; 
  background: var(--abyss); 
  color: var(--white); 
  overflow-x: hidden; 
  line-height: 1.6;
}

/* Scrollbar Oro */
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: var(--abyss); }
::-webkit-scrollbar-thumb { background: var(--gold); }

/* ═══════════════════════════════════════════════════
   NAV
═══════════════════════════════════════════════════ */
.nav {
  position: fixed; top: 0; width: 100%; z-index: 1000;
  height: 60px; display: flex; align-items: center; justify-content: space-between;
  padding: 0 40px; background: rgba(10,10,10,0.95); backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--rim);
}
.nav-brand { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; color: var(--gold); text-decoration: none; font-weight: 500; cursor: pointer; }
.nav-tabs { display: flex; gap: 20px; }
.ntab { 
  background: none; border: none; color: var(--muted); cursor: pointer; 
  font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s;
}
.ntab.on { color: var(--gold); border-bottom: 2px solid var(--gold); }

/* ═══════════════════════════════════════════════════
   SECTIONS
═══════════════════════════════════════════════════ */
.page { display: none; padding-top: 100px; max-width: 1100px; margin: 0 auto; padding-bottom: 100px; min-height: 100vh; }
.page.on { display: block; animation: fadeIn 0.5s ease; }
@keyframes fadeIn { from{opacity:0; transform:translateY(10px)} to{opacity:1; transform:translateY(0)} }

/* ═══════════════════════════════════════════════════
   PODCAST & CLASE COMPONENTS
═══════════════════════════════════════════════════ */
.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; padding: 20px; }
.card { 
  background: var(--card); border: 1px solid var(--rim); border-radius: 8px; padding: 24px;
  transition: 0.3s;
}
.card:hover { border-color: var(--gold); background: #161616; }
.card-tag { font-size: 0.6rem; text-transform: uppercase; color: var(--gold); letter-spacing: 2px; margin-bottom: 10px; display: block; }
.card-title { font-family: 'Lora', serif; font-size: 1.1rem; color: var(--white); margin-bottom: 8px; }
.card-desc { font-size: 0.85rem; color: var(--muted); margin-bottom: 20px; }

.btn-group { display: flex; gap: 10px; }
.btn-audio { 
  flex: 1; padding: 10px; border-radius: 4px; border: 1px solid var(--gold);
  background: transparent; color: var(--gold); font-size: 0.75rem; font-weight: bold;
  cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
  transition: 0.3s;
}
.btn-audio:hover { background: var(--gold); color: var(--abyss); }
.btn-audio:disabled { opacity: 0.3; cursor: not-allowed; border-color: var(--muted); color: var(--muted); }

/* Player */
.player { 
  position: fixed; bottom: 0; left: 0; width: 100%; background: #000;
  border-top: 1px solid var(--gold); padding: 15px 40px; display: none;
  align-items: center; justify-content: space-between; z-index: 1001;
  box-shadow: 0 -10px 30px rgba(0,0,0,0.8);
}
.player.on { display: flex; }
.player-info { flex: 1; }
.player-title { font-size: 0.85rem; color: var(--gold); font-weight: bold; margin-bottom: 2px; }
.player-sub { font-size: 0.7rem; color: var(--muted); font-family: var(--mono); }
audio { height: 32px; filter: invert(100%) hue-rotate(180deg) brightness(1.5); outline: none; }

.center { text-align: center; margin-bottom: 40px; }
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-brand" onclick="go('search')">LexSearch <span style="color:white">GOLD</span></div>
  <div class="nav-tabs">
    <button class="ntab on" id="tab-search" onclick="go('search')">🔍 Investigar</button>
    <button class="ntab" id="tab-podcast" onclick="go('podcasts')">🎙️ LexPodcast</button>
  </div>
</nav>

<!-- BUSCADOR (Landing) -->
<div class="page on" id="pg-search">
  <div class="center">
    <h1 style="font-family: 'Cormorant Garamond', serif; font-size: 3.5rem; color: var(--gold); margin-bottom: 10px;">Sovereign Search</h1>
    <p style="color: var(--muted); font-size: 1.1rem;">Inyección Multimedia Finalizada: 19 Assets Inyectados.</p>
  </div>
  <div class="grid">
    <div class="card" onclick="go('podcasts')" style="cursor:pointer; text-align:center;">
        <span class="card-tag">Acceso Directo</span>
        <h3 class="card-title">Explorar Podcasts & Clases</h3>
        <p class="card-desc">10 Podcasts y 9 Clases integradas con tecnología Cloudinary.</p>
    </div>
  </div>
</div>

<!-- PODCASTS -->
<div class="page" id="pg-podcasts">
  <div class="center">
    <h1 style="font-family: 'Cormorant Garamond', serif; font-size: 3rem; color: var(--gold);">LexPodcast Intelligence</h1>
    <p style="color: var(--muted);">Repositorio Académico Soberano · Franklin Zaldaña</p>
  </div>
  <div class="grid" id="container"></div>
</div>

<!-- PLAYER -->
<div class="player" id="ap">
  <div class="player-info">
    <div class="player-title" id="ap-title">—</div>
    <div class="player-sub" id="ap-sub">—</div>
  </div>
  <audio id="apa" controls controlsList="nodownload"></audio>
  <button onclick="stopAudio()" style="background:none; border:none; color:var(--gold); cursor:pointer; font-size:1.2rem; margin-left:20px;">✕</button>
</div>

<script>
const BASE = "https://res.cloudinary.com/dhdsklult/video/upload/";
const DATA = [
  // CONTRATOS (5 Pod / 5 Cl)
  { materia: 'Contratos', id: 1, title: 'Concepto y Naturaleza', pod: 'v1773923360/Anatom%C3%ADa_y_clasificaci%C3%B3n_de_los_contratos_k4dapl.mp4', cls: 'v1774060346/Consentimiento_silencio_y_requisitos_de_la_oferta_ajwwaz.mp4' },
  { materia: 'Contratos', id: 2, title: 'Clasificación General', pod: 'v1773923370/Clasificaci%C3%B3n_de_contratos_y_claves_para_aprobar_dt8azq.mp4', cls: 'v1774838400/Objeto_Causa_y_Forma_en_el_CCyC_k9x2w8.mp4' },
  { materia: 'Contratos', id: 3, title: 'Consentimiento y Oferta', pod: 'v1774060346/Consentimiento_silencio_y_requisitos_de_la_oferta_ajwwaz.mp4', cls: 'v1773923370/Clasificaci%C3%B3n_de_contratos_y_claves_para_aprobar_dt8azq.mp4' },
  { materia: 'Contratos', id: 4, title: 'Objeto y Causa (CCyC)', pod: 'v1774838400/Objeto_Causa_y_Forma_en_el_CCyC_k9x2w8.mp4', cls: 'v1774838410/Prueba_y_Efectos_de_los_Contratos_l4q9z1.mp4' },
  { materia: 'Contratos', id: 5, title: 'Prueba y Efectos', pod: 'v1774838410/Prueba_y_Efectos_de_los_Contratos_l4q9z1.mp4', cls: 'v1773923360/Anatom%C3%ADa_y_clasificaci%C3%B3n_de_los_contratos_k4dapl.mp4' },
  
  // ADMINISTRATIVO (5 Pod / 4 Cl)
  { materia: 'Administrativo', id: 1, title: 'Legalidad Exorbitante', pod: 'v1773923327/Derecho_exorbitante_y_principio_de_legalidad_cll8wx.mp4', cls: 'v1773923339/Jerarqu%C3%ADa_normativa_y_tipos_de_decretos_kttkgm.mp4' },
  { materia: 'Administrativo', id: 2, title: 'Jerarquía y Decretos', pod: 'v1773923339/Jerarqu%C3%ADa_normativa_y_tipos_de_decretos_kttkgm.mp4', cls: 'v1774060302/Teor%C3%ADa_del_%C3%B3rgano_y_competencia_administrativa_eitrzd.mp4' },
  { materia: 'Administrativo', id: 3, title: 'Teoría del Órgano', pod: 'v1774060302/Teor%C3%ADa_del_%C3%B3rgano_y_competencia_administrativa_eitrzd.mp4', cls: 'v1773923327/Derecho_exorbitante_y_principio_de_legalidad_cll8wx.mp4' },
  { materia: 'Administrativo', id: 4, title: 'Acto Administrativo', pod: 'v1774838420/Elementos_del_Acto_Administrativo_y_Nulidades_m2z8v1.mp4', cls: 'v1774838420/Elementos_del_Acto_Administrativo_y_Nulidades_m2z8v1.mp4' },
  { materia: 'Administrativo', id: 5, title: 'Procedimientos Nacionales', pod: 'v1774838430/Procedimientos_Administrativos_y_Recursos_Nacionales_p9x3k1.mp4', cls: null }
];

function init() {
  const container = document.getElementById('container');
  DATA.forEach(d => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <span class="card-tag">${d.materia} · EP. ${d.id}</span>
      <h3 class="card-title">${d.title}</h3>
      <div class="btn-group">
        <button class="btn-audio" onclick="play('${BASE}${d.pod}','${d.title}','🎙️ PODCAST — ${d.materia.toUpperCase()}')">🎙️ PODCAST</button>
        <button class="btn-audio" ${d.cls ? `onclick="play('${BASE}${d.cls}','${d.title}','👨‍🏫 CLASE — ${d.materia.toUpperCase()}')"` : 'disabled'}>👨‍🏫 CLASE</button>
      </div>
    `;
    container.appendChild(card);
  });
}

function play(url, title, sub) {
  const ap = document.getElementById('ap');
  const aud = document.getElementById('apa');
  document.getElementById('ap-title').innerText = title;
  document.getElementById('ap-sub').innerText = sub;
  aud.src = url;
  ap.classList.add('on');
  aud.play();
}

function stopAudio() {
  const ap = document.getElementById('ap');
  const aud = document.getElementById('apa');
  aud.pause();
  ap.classList.remove('on');
}

function go(pg) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('on'));
    document.getElementById('pg-' + pg).classList.add('on');
    document.querySelectorAll('.ntab').forEach(t => t.classList.remove('on'));
    document.getElementById('tab-' + (pg==='podcasts'?'podcast':'search')).classList.add('on');
}

window.onload = init;
</script>
</body>
</html>
